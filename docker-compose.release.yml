services:
  gateway:
    build:
      context: .
      target: gateway-runner
    env_file:
      - .env
    environment:
      OCTOPUS_GATEWAY_HOST: 0.0.0.0
      OCTOPUS_GATEWAY_PORT: 4321
      OCTOPUS_GATEWAY_TRUST_PROXY_CIDRS: 172.30.0.0/24
      OCTOPUS_GATEWAY_ALLOW_INSECURE_TRUST_PROXY: true
      OCTOPUS_SETUP_TOKEN: ${OCTOPUS_SETUP_TOKEN}
    volumes:
      - octopus-data:/workspace
    expose:
      - "4321"
    networks:
      - octopus-release
    restart: unless-stopped

  web:
    build:
      context: .
      target: web-runner
    depends_on:
      - gateway
    ports:
      - "${OCTOPUS_WEB_PORT:-8080}:80"
    networks:
      - octopus-release
    restart: unless-stopped

networks:
  octopus-release:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24

volumes:
  octopus-data:
